<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="margin:0;padding:0;background-color:#f5f5f5;">
<div style="margin:0px auto;max-width:600px;padding:40px 0 0 0;">
    <div style="background:#ffffff;margin:0px auto;max-width:600px;border-radius:8px;overflow:hidden;">
        <div style="padding:30px;font-family:Arial, Helvetica, sans-serif;color:#333333;">

            <p style="font-size:16px;line-height:24px;">Hello <span th:text="${firstName}"></span>,</p>

            <p style="font-size:20px;font-weight:bold;line-height:24px;">Reset your ImaraBill password</p>

            <p style="font-size:16px;line-height:24px;">
                We received a request to reset your password for <strong th:text="${email}"></strong>.
                Click the button below to choose a new password.
            </p>

            <table cellpadding="0" cellspacing="0" style="margin:24px 0;">
                <tr>
                    <td style="border-radius:6px;background-color:#2563eb;">
                        <a th:href="${resetLink}" style="display:inline-block;padding:12px 24px;font-size:16px;font-weight:bold;color:#ffffff;text-decoration:none;">
                            Reset password
                        </a>
                    </td>
                </tr>
            </table>

            <p style="font-size:16px;line-height:24px;">
                If you didn't request this, you can safely ignore this message. The link will expire shortly.
            </p>

            <p style="font-size:16px;line-height:24px;">
                Best Regards<br/>
                Imara Billers
            </p>
        </div>
    </div>
</div>
</body>
</html>
