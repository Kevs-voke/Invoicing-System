# This file is safe to commit — it contains no secrets.
# Activated on Render via env var: SPRING_PROFILES_ACTIVE=prod
# All secrets/environment-specific values (DB URLs, passwords, JWT secret,
# mail credentials, frontend URLs) are supplied separately as Render env vars.

# --- R2DBC connection pool ---
spring.r2dbc.pool.enabled=true
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=10
spring.r2dbc.pool.max-idle-time=30m

# --- Flyway ---
spring.flyway.enabled=true

# --- Quartz job store ---
spring.datasource.quartz.driver-class-name=org.postgresql.Driver
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=never
spring.quartz.properties.org.quartz.scheduler.instanceName=invoicing-system
spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
spring.quartz.properties.org.quartz.jobStore.useProperties=false
spring.quartz.properties.org.quartz.jobStore.misfireThreshold=60000
spring.quartz.properties.org.quartz.jobStore.tablePrefix=QRTZ_
spring.quartz.properties.org.quartz.jobStore.isClustered=false
spring.quartz.properties.org.quartz.threadPool.class=org.quartz.simpl.SimpleThreadPool
spring.quartz.properties.org.quartz.threadPool.threadCount=5

# --- Mail (non-secret parts; host/username/password/from set via env vars) ---
spring.mail.port=587
spring.mail.name=imarabillers.co.ke
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# --- Logging ---
logging.level.io.r2dbc=INFO
logging.level.org.springframework.r2dbc=INFO
logging.level.com.itextpdf.styledxmlparser.css.parse.CssRuleSetParser=OFF
logging.level.com.itextpdf.styledxmlparser.css.resolve.CssDefaults=OFF
logging.level.com.itextpdf.styledxmlparser.css.ICssResolver=OFF
logging.level.com.itextpdf.styledxmlparser.util.CssVariableUtil=OFF