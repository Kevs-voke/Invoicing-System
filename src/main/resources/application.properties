spring.application.name=InvoicingSystem

# Database
spring.r2dbc.url=r2dbc:postgresql://localhost:5432/invoicing_system_db
spring.r2dbc.username=normal
spring.r2dbc.password=0000

# Connection Pool
spring.r2dbc.pool.enabled=true
spring.r2dbc.pool.initial-size=5
spring.r2dbc.pool.max-size=10
spring.r2dbc.pool.max-idle-time=30m

# Flyway (uses JDBC url, not R2DBC)
spring.flyway.url=jdbc:postgresql://localhost:5432/invoicing_system_db
spring.flyway.user=normal
spring.flyway.password=0000
spring.flyway.enabled=true

